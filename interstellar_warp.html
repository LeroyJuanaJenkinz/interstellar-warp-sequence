<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interstellar Warp Sequence</title>
<style>
html,body{margin:0;padding:0;background:#000;overflow:hidden;height:100%;width:100%;}
canvas{display:block;width:100vw;height:100vh;}
#ui{position:fixed;top:12px;left:12px;z-index:10;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;font-family:sans-serif;color:#dfe8ff;font-size:13px;backdrop-filter:blur(6px);}

#ui button{cursor:pointer;}#ui button:hover{background:#1c2d52;}#status{margin-top:6px;opacity:.7;font-size:11px;}
</style>
</head>
<body>
<canvas id="glcanvas"></canvas>
<div id="ui">

<option value="https://user.uploads.dev/file/9193bdef8d80face1b1e0cbfe6b85d87.mp3">Wiprise3.mp3</option>

<option value="https://user.uploads.dev/file/23d576fc814b4cbe83901e5e7334af9e.wav">WIPRise5.wav</option>

<script>
const canvas=document.getElementById('glcanvas');
const gl=canvas.getContext('webgl2')||canvas.getContext('webgl');
if(!gl){document.getElementById('status').textContent='WebGL not supported.';}
const RENDER_SCALE=0.72;
function resize(){canvas.width=Math.floor(window.innerWidth*RENDER_SCALE);canvas.height=Math.floor(window.innerHeight*RENDER_SCALE);gl.viewport(0,0,canvas.width,canvas.height);}window.addEventListener('resize',resize);resize();
const vertSrc=`attribute vec2 aPos;void main(){gl_Position=vec4(aPos,0.0,1.0);}`;
const fragSrc=`precision highp float;
uniform vec2 iResolution;uniform float iTime;uniform sampler2D iChannel0;uniform sampler2D iChannel1;uniform float uBass;uniform float uMid;uniform float uTreble;uniform float uAudioLevel;
vec4 noiseTex(in vec2 x){vec2 xi=mod(x,1024.0);return texture2D(iChannel0,(xi+0.5)/1024.0);} 
float accelProfile(float t){float rampT=clamp(t/60.0,0.0,1.0);float quad=rampT*rampT;float terminal=smoothstep(60.0,82.0,t);return mix(quad,1.0,terminal);} float velocity(float t){return 0.05+1.35*accelProfile(t);} 
vec2 rotAround(vec2 p,vec2 c,float a){vec2 d=p-c;float s=sin(a),co=cos(a);return c+vec2(d.x*co-d.y*s,d.x*s+d.y*co);} 
float hash12(vec2 p){float h=dot(p,vec2(127.1,311.7));return fract(sin(h)*43758.5453123);} 
float noise3(vec3 p){vec3 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);vec2 ii=i.xy+i.z*vec2(5.0);float a=hash12(ii+vec2(0,0)),b=hash12(ii+vec2(1,0)),c=hash12(ii+vec2(0,1)),d=hash12(ii+vec2(1,1));float v1=mix(mix(a,b,u.x),mix(c,d,u.x),u.y);ii+=vec2(5.0);a=hash12(ii+vec2(0,0));b=hash12(ii+vec2(1,0));c=hash12(ii+vec2(0,1));d=hash12(ii+vec2(1,1));float v2=mix(mix(a,b,u.x),mix(c,d,u.x),u.y);return max(mix(v1,v2,u.z),0.0);} 
float fbmCloud(vec3 x){float r=0.0,w=1.0,s=1.0;for(int i=0;i<3;i++){w*=0.25;s*=3.0;r+=w*noise3(s*x);}return r;} 
vec3 nebulaClouds(vec2 fragCoordPx,vec2 center,float iT){vec3 p=vec3((fragCoordPx-center)*0.008,iT*0.35);float n1=fbmCloud(p*1.4+vec3(0.0,iT*0.05,0.0));float n2=fbmCloud(p*2.2-vec3(0.0,0.0,iT*0.07));vec3 warm=vec3(1.0,0.5,0.4)*n1*1.6;vec3 cool=vec3(0.1,0.6,0.75)*n2*1.3;return warm+cool;} 
float ridgedNoise(vec2 p){float n=noiseTex(p).x;return 1.0-abs(n*2.0-1.0);} 
float plasmaFbm(vec2 p){float z=1.0,rz=0.0;mat2 m=mat2(0.8,0.6,-0.6,0.8);for(int i=0;i<3;i++){rz+=ridgedNoise(p)/z;z*=1.9;p=p*2.0*m;}return rz;} 
vec4 plasmaTunnelTexture(vec2 fragCoord,float iT,float vel){vec2 uv=(fragCoord-iResolution.xy*0.5)/(iResolution.y*0.5);float r=length(uv);float ang=atan(uv.y,uv.x);float dep=1.0/max(r,0.02);float scroll=iT*(0.55+0.65*vel);vec2 tunnelUV=vec2(ang*(2.4/3.14159)+0.15*sin(dep*0.12+iT*0.4),dep*0.16-scroll);float fil=plasmaFbm(tunnelUV*2.8);float band=plasmaFbm(vec2(tunnelUV.x*0.65+3.1,tunnelUV.y*1.7));float val=smoothstep(0.38,1.25,fil)*0.8+smoothstep(0.52,1.35,band)*0.55;float wall=smoothstep(0.22,0.55,r)*(1.0-smoothstep(0.92,1.18,r));float centerVoid=1.0-smoothstep(0.0,0.18,r);val*=wall;vec3 plasma=mix(vec3(0.55,0.02,0.86),vec3(0.08,0.88,1.0),clamp(val,0.0,1.0));plasma=mix(plasma,vec3(1.0,0.22,0.9),smoothstep(0.45,1.0,val));float alpha=clamp(val*0.95,0.0,1.0)*(1.0-centerVoid);return vec4(plasma,alpha);} 
mat2 flareM2=mat2(0.80,0.60,-0.60,0.80);float flareNoise(vec2 x){return noiseTex(x*0.05).x;} float flareFbm(vec2 p){float z=2.0,rz=-0.05;p*=0.25;for(int i=1;i<4;i++){rz+=abs((flareNoise(p)-0.5)*2.0)/z;z*=2.0;p=p*2.0*flareM2;}return rz;} vec3 energyStreaks(vec2 fragCoordPx,vec2 center,float iT,float bassLvl){float ft=-iT*0.33;vec2 uv=(fragCoordPx-center)/iResolution.y;uv*=1.5;float r=sqrt(dot(uv,uv));vec2 nuv=normalize(uv+1e-5);float x=dot(nuv,vec2(0.5,0.0))+ft;float y=dot(nuv,vec2(0.0,0.5))+ft;float val=flareFbm(vec2(r+y*4.5,x*4.5));val=smoothstep(0.08,1.1,val);val=sqrt(max(val,0.0));vec3 col=vec3(1.0)-(vec3(val)/vec3(4.0,1.0,0.3));col=1.0-col;float rad=6.0+14.0*bassLvl;col=mix(col,vec3(1.0),clamp(rad-266.667*r,0.0,1.0));return col*val;} 
vec3 interstellar1(vec2 fragCoord,float iT){vec3 ray;ray.xy=2.0*(fragCoord-iResolution.xy*.5)/iResolution.x;ray.z=0.5;float offset=iT*iT*0.19;float speed2=0.0009*iT*offset;float speed=speed2*iT/offset*speed2+0.28;vec3 col=vec3(0);vec3 stp=ray/max(abs(ray.x),abs(ray.y));vec3 pos=2.0*stp+.5;for(int i=0;i<20;i++){float z=noiseTex(pos.xy).x;z=fract(z-offset);float d=50.0*z-pos.z;float w=pow(max(0.0,1.0-8.0*length(fract(pos.xy)-.5)),2.0);vec3 cc=max(vec3(0),vec3(1.0-abs(d+speed2*.5)/speed,1.0-abs(d)/speed,1.0-abs(d-speed2*.5)/speed));col+=1.5*(1.0-z)*cc*w;pos+=stp;}return col;} 
vec3 interstellar2(vec2 fragCoord,float iT){vec3 ray;ray.xy=50.0*(fragCoord-iResolution.xy*.5)/iResolution.x*iT;ray.z=0.6;float WIP=abs(fract(ray.z));float offset=iT*iT*0.01;float speed2=0.0000075/max(iT,0.001)*offset;float speed=speed2*iT/max(offset,0.001)*speed2+0.20*abs(WIP);vec3 col=vec3(0);vec3 stp=ray/max(abs(ray.x),abs(ray.y)*WIP/max(cos(WIP*WIP),0.1));vec3 pos=10.0*stp+.5;for(int i=0;i<20;i++){float z=noiseTex(pos.xy).x;z=fract(z-offset);float d=9.0*z-pos.z;float w=pow(max(0.0,1.0-8.0*length(fract(pos.xy)-.5)),2.0);vec3 cc=max(vec3(0),vec3(3.215-abs(d+speed2+.9)/max(abs(speed2),0.001),cos(offset)-abs(d)/max(speed,0.001),1.0-abs(d-speed2*.5)/max(speed,0.001)));col+=1.5*(3.0-z)*cc*w;pos+=stp*abs(fract(WIP));}return col;} 
vec3 interstellarConstant(vec2 fragCoord,float iT){vec3 ray;ray.xy=5.0*(fragCoord-iResolution.xy*.5)/iResolution.x;ray.z=0.5;float offset=iT*iT*0.19;float speed2=0.0009*iT*offset;float speed=speed2*iT/offset*speed2+0.28;vec3 col=vec3(0);vec3 stp=ray/max(abs(ray.x),abs(ray.y));vec3 pos=2.0*stp+.5;for(int i=0;i<20;i++){float z=noiseTex(pos.xy).x;z=fract(z-offset);float d=50.0*z-pos.z;float w=pow(max(0.0,1.0-8.0*length(fract(pos.xy)-.5)),2.0);vec3 cc=max(vec3(0),vec3(1.0-abs(d+speed2*.5)/speed,0.545-abs(d)/speed,1.0-abs(d-speed2*.5)/speed)*abs(iT));col+=1.5*(1.0-z)*cc*w;pos+=stp;}return col;} 
void main(){float t=iTime;float vel=velocity(t);vec2 R=iResolution.xy;vec2 fragCoord=gl_FragCoord.xy;vec2 uv=fragCoord/R;vec2 center=R*0.5;float rotStart=25.0;float dtRot=max(0.0,t-rotStart);float rotMax=0.09+0.05*uBass;float tau=6.0;float dragFactor=1.0-exp(-dtRot/tau);float globalSpin=rotMax*dtRot-rotMax*tau*dragFactor+0.004*dtRot*dtRot;float shakeGate=step(25.0,t);float shakeAmt=shakeGate*vel*(0.005+0.01*uAudioLevel);vec2 shake=shakeAmt*vec2(sin(t*37.0)+sin(t*13.7),cos(t*29.0)+cos(t*17.3));vec2 fc=fragCoord+shake*R.x;fc=rotAround(fc,center,globalSpin);float breathe=0.02*sin(t*1.3)+0.015*uMid*sin(t*4.7);float fov=mix(1.0,1.55,vel)+0.15*uBass+breathe;vec2 fcFov=center+(fc-center)*fov;float spin1=0.05*t+0.15*vel+0.05*uMid;float spin2=-0.035*t-0.10*vel-0.05*uMid;float spin3=0.02*t+0.22*vel+0.08*uTreble;vec2 dir=normalize(fcFov-center+1e-4);float blurLen=mix(0.002,0.03,vel)+0.02*uAudioLevel;const int BLUR_TAPS=8;vec3 blend=vec3(0);for(int k=0;k<BLUR_TAPS;k++){float f=(float(k)/float(BLUR_TAPS-1)-0.5);vec2 samplePx=fcFov+dir*f*blurLen*R.x;vec3 i1=interstellar1(rotAround(samplePx,center,spin1),t);vec3 i2=interstellar2(rotAround(samplePx,center,spin2),t);vec3 i3=interstellarConstant(rotAround(samplePx,center,spin3),t);vec3 blend12=mix(i1,i2,clamp(0.35+0.5*vel,0.0,0.9));blend+=mix(blend12,blend12+i3*0.5,0.6);}blend/=float(BLUR_TAPS);vec3 col=blend*0.85;vec3 nebula=nebulaClouds(fcFov,center,t);float tunnelBright=dot(col,vec3(0.299,0.587,0.114));float nebulaVisibility=1.0-clamp(tunnelBright*1.4,0.0,1.0);col+=nebula*nebulaVisibility*0.9;vec4 plasmaTex=plasmaTunnelTexture(fcFov,t,vel);col=mix(col,col+plasmaTex.rgb*1.05,plasmaTex.a*0.48);vec3 prevFrame=texture2D(iChannel1,uv).rgb;float trail=clamp(0.25+0.6*vel,0.0,0.9);col=mix(col,prevFrame*0.985,trail*0.55);float thresh=0.55-0.15*uAudioLevel;vec3 bright=max(col-thresh,0.0);vec3 bloomAccum=vec3(0);const int BLOOM_TAPS=8;float bloomRadius=mix(0.006,0.02,uAudioLevel)*R.x;for(int b=0;b<BLOOM_TAPS;b++){float ang=6.2831853*float(b)/float(BLOOM_TAPS);vec2 off=vec2(cos(ang),sin(ang))*bloomRadius;bloomAccum+=max(texture2D(iChannel1,(fragCoord+off)/R).rgb-thresh,0.0);}bloomAccum/=float(BLOOM_TAPS);float bloomStrength=0.6+1.8*uAudioLevel;col+=(bright+bloomAccum)*bloomStrength;vec3 energy=energyStreaks(fcFov,center,t,uBass);col+=energy*(0.35+0.5*uBass)*0.5;float sat=mix(0.85,1.35,clamp(vel,0.0,1.0))+0.15*uTreble;float luma=dot(col,vec3(0.299,0.587,0.114));col=mix(vec3(luma),col,sat);vec3 warm=col*vec3(1.15,0.95,0.75);vec3 blue=col*vec3(0.5,0.72,1.4);float colorMix=clamp(vel,0.0,1.0);col=mix(warm,blue,smoothstep(0.0,1.0,colorMix));col=mix(col,blue,colorMix*0.5);col=col/(1.0+col*0.35);float distFromCenter=length((fragCoord-center)/center);float vigStrength=mix(0.25,0.75,vel);float vig=1.0-vigStrength*smoothstep(0.4,1.15,distFromCenter);col*=vig;gl_FragColor=vec4(col,1.0);} `;
function compile(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(s));}return s;}
const vs=compile(gl.VERTEX_SHADER,vertSrc),fs=compile(gl.FRAGMENT_SHADER,fragSrc),prog=gl.createProgram();gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);gl.useProgram(prog);
const blitFragSrc=`precision mediump float;uniform sampler2D uTex;uniform vec2 uRes;void main(){vec2 uv=gl_FragCoord.xy/uRes;gl_FragColor=texture2D(uTex,uv);}`;
const blitVs=compile(gl.VERTEX_SHADER,vertSrc),blitFs=compile(gl.FRAGMENT_SHADER,blitFragSrc),blitProg=gl.createProgram();gl.attachShader(blitProg,blitVs);gl.attachShader(blitProg,blitFs);gl.linkProgram(blitProg);
const blitUTex=gl.getUniformLocation(blitProg,'uTex'),blitURes=gl.getUniformLocation(blitProg,'uRes'),blitAPos=gl.getAttribLocation(blitProg,'aPos');
const quad=new Float32Array([-1,-1,1,-1,-1,1,1,1]);const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,quad,gl.STATIC_DRAW);const aPos=gl.getAttribLocation(prog,'aPos');gl.enableVertexAttribArray(aPos);gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);
const uRes=gl.getUniformLocation(prog,'iResolution'),uTime=gl.getUniformLocation(prog,'iTime'),uCh0=gl.getUniformLocation(prog,'iChannel0'),uCh1=gl.getUniformLocation(prog,'iChannel1'),uBassLoc=gl.getUniformLocation(prog,'uBass'),uMidLoc=gl.getUniformLocation(prog,'uMid'),uTrebleLoc=gl.getUniformLocation(prog,'uTreble'),uAudioLvlLoc=gl.getUniformLocation(prog,'uAudioLevel');
const NOISE_SIZE=1024;const noiseData=new Uint8Array(NOISE_SIZE*NOISE_SIZE*4);for(let i=0;i<noiseData.length;i++)noiseData[i]=Math.floor(Math.random()*256);const noiseTexObj=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,noiseTexObj);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,NOISE_SIZE,NOISE_SIZE,0,gl.RGBA,gl.UNSIGNED_BYTE,noiseData);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
function makeFBO(w,h){const tex=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,tex);gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);const fbo=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,tex,0);gl.bindFramebuffer(gl.FRAMEBUFFER,null);return {tex,fbo,w,h};}
let fboA,fboB;function initFBOs(){fboA=makeFBO(canvas.width,canvas.height);fboB=makeFBO(canvas.width,canvas.height);}initFBOs();window.addEventListener('resize',()=>{resize();initFBOs();});
const audioEl=document.getElementById('audioEl'),trackSel=document.getElementById('track'),playBtn=document.getElementById('playBtn'),stopBtn=document.getElementById('stopBtn'),restartBtn=document.getElementById('restartBtn'),statusEl=document.getElementById('status');
let audioCtx,analyser,srcNode,freqData,bassLevel=0,midLevel=0,trebleLevel=0,audioLevel=0;function setupAudioGraph(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=1024;freqData=new Uint8Array(analyser.frequencyBinCount);srcNode=audioCtx.createMediaElementSource(audioEl);srcNode.connect(analyser);analyser.connect(audioCtx.destination);} 
function updateAudioLevels(){if(!analyser)return;analyser.getByteFrequencyData(freqData);const n=freqData.length,bassEnd=Math.floor(n*0.08),midEnd=Math.floor(n*0.35);let bass=0,mid=0,treble=0;for(let i=0;i<bassEnd;i++)bass+=freqData[i];for(let i=bassEnd;i<midEnd;i++)mid+=freqData[i];for(let i=midEnd;i<n;i++)treble+=freqData[i];bass/=(bassEnd*255);mid/=((midEnd-bassEnd)*255);treble/=((n-midEnd)*255);bassLevel=bassLevel*0.7+bass*0.3;midLevel=midLevel*0.7+mid*0.3;trebleLevel=trebleLevel*0.7+treble*0.3;audioLevel=(bassLevel+midLevel+trebleLevel)/3.0;} 
audioEl.addEventListener('ended',()=>{startTime=performance.now();audioEl.currentTime=0;isPlaying=true;audioEl.play();});
playBtn.addEventListener('click',async()=>{setupAudioGraph();if(!hasStarted||audioEl.src!==trackSel.value){audioEl.src=trackSel.value;audioEl.currentTime=0;}try{await audioEl.play();if(audioCtx.state==='suspended')await audioCtx.resume();if(!hasStarted){startTime=performance.now();hasStarted=true;}isPlaying=true;statusEl.textContent='Playing: '+trackSel.options[trackSel.selectedIndex].text;}catch(e){statusEl.textContent='Playback failed: '+e.message;}});
stopBtn.addEventListener('click',()=>{isPlaying=false;audioEl.pause();statusEl.textContent='Stopped.';});
restartBtn.addEventListener('click',async()=>{setupAudioGraph();audioEl.src=trackSel.value;audioEl.currentTime=0;startTime=performance.now();hasStarted=true;try{await audioEl.play();if(audioCtx.state==='suspended')await audioCtx.resume();isPlaying=true;statusEl.textContent='Restarted: '+trackSel.options[trackSel.selectedIndex].text;}catch(e){statusEl.textContent='Playback failed: '+e.message;}});
trackSel.addEventListener('change',async()=>{if(!audioCtx||!hasStarted)return;audioEl.src=trackSel.value;audioEl.currentTime=0;await audioEl.play();startTime=performance.now();isPlaying=true;statusEl.textContent='Playing: '+trackSel.options[trackSel.selectedIndex].text;});
let startTime=performance.now(),isPlaying=false,hasStarted=false;function renderPass(target,prevTex,time){gl.bindFramebuffer(gl.FRAMEBUFFER,target?target.fbo:null);gl.viewport(0,0,target?target.w:canvas.width,target?target.h:canvas.height);gl.useProgram(prog);gl.uniform2f(uRes,target?target.w:canvas.width,target?target.h:canvas.height);gl.uniform1f(uTime,time);gl.uniform1f(uBassLoc,bassLevel);gl.uniform1f(uMidLoc,midLevel);gl.uniform1f(uTrebleLoc,trebleLevel);gl.uniform1f(uAudioLvlLoc,audioLevel);gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,noiseTexObj);gl.uniform1i(uCh0,0);gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,prevTex);gl.uniform1i(uCh1,1);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);} 
let pingpong=true;function blitToScreen(tex){gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,window.innerWidth,window.innerHeight);gl.useProgram(blitProg);gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.enableVertexAttribArray(blitAPos);gl.vertexAttribPointer(blitAPos,2,gl.FLOAT,false,0,0);gl.uniform2f(blitURes,window.innerWidth,window.innerHeight);gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,tex);gl.uniform1i(blitUTex,0);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);} 
function renderStaticBlack(){gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,window.innerWidth,window.innerHeight);gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);}renderStaticBlack();
function frame(){if(!isPlaying){requestAnimationFrame(frame);return;}updateAudioLevels();const t=(performance.now()-startTime)/1000.0;const readTex=pingpong?fboB.tex:fboA.tex;const writeFBO=pingpong?fboA:fboB;renderPass(writeFBO,readTex,t);blitToScreen(writeFBO.tex);pingpong=!pingpong;requestAnimationFrame(frame);}requestAnimationFrame(frame);
</script></body></html>
